# .github/workflows/cicd.yml — 단계 3: OIDC + Docker Hub + SSM

name: CI/CD - cicd-basic-lab to mylab-bastion (OIDC + SSM)
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

# 빈칸 1: OIDC 토큰 발급을 위한 권한
permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cicd-basic-lab
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 빌드
        run: mvn -B package -DskipTests

      - name: JAR 파일명 정리
        run: mv ./target/*.jar ./target/app.jar

      - name: 이미지 태그 생성
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ vars.DOCKERHUB_USERNAME }}/cicd-basic-lab:${{ github.run_number }}-$SHORT_SHA"
          echo "value=$TAG" >> $GITHUB_OUTPUT

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 및 Push
        uses: docker/build-push-action@v6
        with:
          # 빌드 컨텍스트는 Dockerfile이 있는 프로젝트 폴더
          context: ./cicd-basic-lab
          push: true
          tags: |
            ${{ steps.tag.outputs.value }}
            ${{ vars.DOCKERHUB_USERNAME }}/cicd-basic-lab:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: 배포할 이미지 출력
        run: |
          echo "배포 이미지: ${{ needs.ci.outputs.image_tag }}"

      - name: AWS 자격증명 설정 (OIDC)
        # 빈칸 2: configure-aws-credentials 액션 (소유자/저장소@v4)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 빈칸 3: vars로 등록한 Role ARN 참조
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: 자격증명 검증
        # 현재 어떤 Role로 인증되었는지 확인 (디버깅 목적)
        run: aws sts get-caller-identity

      - name: SSM Send-Command로 EC2 배포
        id: ssm
        # 빈칸 4: SSM SendCommand 호출 (AWS-RunShellScript 사용)
        # 힌트: aws ssm send-command --instance-ids {EC2_INSTANCE_ID} --document-name "AWS-RunShellScript" --parameters commands=...
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ vars.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy cicd-basic-lab run #${{ github.run_number }}" \
            --parameters '{"commands":[
              "docker pull ${{ needs.ci.outputs.image_tag }}",
              "docker stop cicd-basic-lab || true",
              "docker rm cicd-basic-lab || true",
              "docker run -d --name cicd-basic-lab -p 8080:8080 -e TZ=Asia/Seoul --restart unless-stopped ${{ needs.ci.outputs.image_tag }}",
              "docker image prune -f",
              "docker ps"
            ]}' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: SSM 명령 결과 대기 및 확인
        # 빈칸 5: 명령 실행 완료까지 대기 후 결과 출력
        # 힌트:
        #   sleep 10  (또는 폴링 로직)
        #   aws ssm get-command-invocation --command-id {command_id} --instance-id {EC2_INSTANCE_ID}
        run: |
          sleep 10
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id ${{ vars.EC2_INSTANCE_ID }} \
            --query "{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}" \
            --output table
